<section id="quienes-somos" class="corporate-about-section" data-nav="theme-dark">
  <div class="corporate-about-container reveal">
    <div class="section-header home-section-header">
      <h2 class="section-title">Sobre mí</h2>
    </div>
    <div class="corporate-about-grid">
      @for (item of items; track item.title; let i = $index) {
        <div class="corporate-card" [style.animation-delay]="(i * 0.1) + 's'">
          <div class="corporate-card-icon">
            <i [class]="item.icon"></i>
          </div>
          <h3 class="corporate-card-title">{{ item.title }}</h3>
          <p class="corporate-card-description">{{ item.description }}</p>
        </div>
      }
    </div>
  </div>
</section>
