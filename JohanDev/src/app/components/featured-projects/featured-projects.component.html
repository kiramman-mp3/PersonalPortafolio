<section class="featured-projects-section" id="proyectos-destacados">
  <div class="projects-container">
    <div class="section-header home-section-header">
      <h2 class="section-title">Proyectos</h2>
    </div>

    <div class="projects-grid">
      <div *ngFor="let project of featuredProjects" class="project-card">
        <div class="project-image">
          <img [src]="project.image" [alt]="project.title" />
        </div>
        <div class="project-content">
          <div class="project-header">
            <h3 class="project-title">{{ project.title }}</h3>
            <div class="project-badge" [ngClass]="getStatusBadgeClass(project.status)">
              <i class="fas" [ngClass]="getStatusIcon(project.status)"></i>
              <span>{{ getStatusText(project.status) }}</span>
            </div>
          </div>
          <p class="project-description">{{ getShortDescription(project) }}</p>
          <div class="project-footer">
            <div class="project-tech">
              <span *ngFor="let tech of project.technologies.slice(0, 3)" class="tech-tag">
                {{ tech }}
              </span>
            </div>
          </div>
          <a [routerLink]="['/proyectos', project.id]" class="view-more-btn">
            Ver más <i class="fas fa-arrow-right"></i>
          </a>
        </div>
      </div>
    </div>

    <!-- View All Button -->
    <div class="view-all-container">
      <a routerLink="/proyectos" class="btn-view-all">
        Ver todos los proyectos <i class="fas fa-chevron-right"></i>
      </a>
    </div>
  </div>
</section>
